name: Build & Deploy AlphaSync

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/alphasync

jobs:
  # ─── Stage 1: Build Docker images & push to GitHub Container Registry ───
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build both images IN PARALLEL using Bake
      - name: Build & push all images
        uses: docker/bake-action@v5
        with:
          files: docker-bake.hcl
          push: true
        env:
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          IMAGE_TAG: ${{ github.sha }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

  # ─── Stage 2: Deploy to Contabo VPS via SSH ────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write Firebase credentials file
        env:
          FIREBASE_CREDS: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: |
          if [ -n "$FIREBASE_CREDS" ]; then
            # Use printf to avoid shell expansion of \n in private keys
            printf '%s' "$FIREBASE_CREDS" > firebase-credentials.json
            echo "✅ Firebase credentials written ($(wc -c < firebase-credentials.json) bytes)"
            # Validate it's real JSON with required fields
            python3 -c "import json; d=json.load(open('firebase-credentials.json')); assert d.get('type')=='service_account', 'Not a service account key'; assert d.get('private_key','').startswith('-----BEGIN'), 'Private key looks corrupt'; print('✅ Valid service account for project:', d.get('project_id'))"
          else
            echo '{}' > firebase-credentials.json
            echo "⚠️  FIREBASE_CREDENTIALS_JSON secret is not set!"
          fi

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "docker-compose.prod.yml,deploy/,firebase-credentials.json"
          target: /opt/alphasync/alpha_zebu

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /opt/alphasync/alpha_zebu

            # Firebase credentials must be readable by the non-root 'app' user inside Docker
            chmod 644 firebase-credentials.json

            # Login to GitHub Container Registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images (parallel pull)
            export IMAGE_PREFIX=${{ env.IMAGE_PREFIX }}
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.prod.yml pull --quiet

            # Deploy — force recreate to pick up new credentials and config
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans

            # Run database migrations (non-fatal — init_db handles schema if alembic not set up yet)
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head || echo "⚠️ Alembic migration skipped (init_db will handle schema)"

            # Clean up old images in background
            docker image prune -f &

            # Health check with retry loop instead of fixed sleep
            echo "Waiting for backend..."
            for i in 1 2 3 4 5 6; do
              sleep 3
              if curl -sf http://127.0.0.1:8000/api/health > /dev/null 2>&1; then
                echo "✅ Backend healthy"
                break
              fi
              if [ "$i" = "6" ]; then
                echo "❌ Backend health check failed"
                docker compose -f docker-compose.prod.yml logs backend --tail 30
                exit 1
              fi
            done

            if ! curl -sf http://127.0.0.1:3000 > /dev/null 2>&1; then
              echo "❌ Frontend health check failed"
              docker compose -f docker-compose.prod.yml logs frontend --tail 30
              exit 1
            fi

            echo "✅ Deployment complete — $(date)"
