# ============================================================
#  AlphaSync — Production Docker Compose (Contabo VPS)
#  Domain: www.alphasync.app
# ============================================================
#  Usage:
#    export IMAGE_PREFIX=ghcr.io/netguy001/alphasync
#    export IMAGE_TAG=latest
#    docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:
  # ── Nginx Reverse Proxy + SSL ──────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-webroot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - alphasync

  # ── Certbot (SSL certificate auto-renewal) ─────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt
    # Renew every 12 hours (certbot is smart enough to skip if not needed)
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 43200 & wait $${!}; done"
    restart: unless-stopped
    networks:
      - alphasync

  # ── Backend API (FastAPI) ──────────────────────────────────
  backend:
    image: ${IMAGE_PREFIX:-ghcr.io/netguy001/alphasync}-backend:${IMAGE_TAG:-latest}
    expose:
      - "8000"
    volumes:
      - uploads:/app/uploads
    environment:
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-alphasync}:${POSTGRES_PASSWORD:-alphasync}@db:5432/${POSTGRES_DB:-alphasync}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-alphasync-default-jwt-secret-change-in-production}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-alphasync_redis_default}@redis:6379/0
      - CORS_ORIGINS=["https://www.alphasync.app","https://alphasync.app"]
      - ZEBU_WS_URL=${ZEBU_WS_URL:-wss://go.mynt.in/NorenWSTP/}
      - ZEBU_API_URL=${ZEBU_API_URL:-https://go.mynt.in/NorenWClientTP}
      - ZEBU_API_SECRET=${ZEBU_API_SECRET:-}
      - ZEBU_VENDOR_CODE=${ZEBU_VENDOR_CODE:-}
      - ZEBU_REDIRECT_URI=https://www.alphasync.app/broker/callback
      - BROKER_ENCRYPTION_KEY=${BROKER_ENCRYPTION_KEY:-alphasync-default-broker-key-change-in-production-1234}
      - SIMULATION_MODE=${SIMULATION_MODE:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - alphasync

  # ── Frontend (React via Nginx) ─────────────────────────────
  frontend:
    image: ${IMAGE_PREFIX:-ghcr.io/netguy001/alphasync}-frontend:${IMAGE_TAG:-latest}
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - alphasync

  # ── PostgreSQL 16 ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alphasync}
      POSTGRES_USER: ${POSTGRES_USER:-alphasync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alphasync}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Do NOT expose port externally in production
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alphasync}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alphasync

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    command: >-
      redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-alphasync_redis_default}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-alphasync_redis_default}", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - alphasync

volumes:
  pgdata:
  redisdata:
  uploads:
  certbot-webroot:


networks:
  alphasync:
    driver: bridge
